<meta charset="UTF-8">
<title>Sunny’s Lorebook Merger</title>

<style>
:root {
  --bg: #1b1b1b;
  --panel: #242424;
  --panel-soft: #2b2b2b;
  --border: #3a3a3a;
  --text: #e4e4e4;
  --muted: #a8a8a8;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px;
}

h1 {
  font-size: 2rem;
  font-weight: 600;
  margin-bottom: 28px;
}

h2 {
  font-size: 0.9rem;
  margin: 24px 0 8px 0;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

textarea {
  width: 100%;
  height: 220px;
  padding: 14px;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 0.85rem;
  line-height: 1.5;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  resize: vertical;
}

textarea:focus {
  outline: none;
  border-color: #888;
}

button {
  margin-top: 16px;
  padding: 10px 20px;
  font-size: 0.85rem;
  background: var(--panel-soft);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
}

button:hover {
  background: #3a3a3a;
}

pre {
  margin-top: 16px;
  padding: 16px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  white-space: pre-wrap;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 0.8rem;
  line-height: 1.5;
}
</style>
</head>

<body>
<div class="page">

  <h1>Sunny’s Lorebook Merger</h1>

  <h2>Primary Lorebook (Preserved)</h2>
  <textarea id="jsonA"></textarea>

  <h2>Secondary Lorebook (Appended)</h2>
  <textarea id="jsonB"></textarea>

  <button onclick="mergeLorebooks()">Merge Lorebooks</button>

  <h2>Merged Output</h2>
  <pre id="output"></pre>
  <button onclick="copyOutput()">Copy Output</button>

</div>

<script>
function mergeLorebooks() {
  let a, b;

  try {
    a = JSON.parse(document.getElementById("jsonA").value);
    b = JSON.parse(document.getElementById("jsonB").value);
  } catch {
    alert("Invalid JSON in one or both inputs.");
    return;
  }

  if (!Array.isArray(a.entries)) {
    alert("Primary lorebook has no entries array.");
    return;
  }

  if (!Array.isArray(b.entries)) {
    alert("Secondary lorebook has no entries array.");
    return;
  }

  const merged = structuredClone(a);
  merged.entries = [...a.entries, ...b.entries];

  document.getElementById("output").textContent =
    JSON.stringify(merged, null, 2);
}

function copyOutput() {
  const output = document.getElementById("output").textContent;
  if (!output.trim()) return;
  navigator.clipboard.writeText(output);
}
</script>

</body>
</html>
